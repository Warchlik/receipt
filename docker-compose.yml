# TODO: add node containter for node.js and nginx container for serving compiled files
services:
  receipt-db:
    image: postgres:17-alpine
    container_name: receipt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: receipt-user
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: receipt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipt-user -d receipt"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
